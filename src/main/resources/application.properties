# ===============================
# APPLICATION
# ===============================
spring.application.name=jobportal
server.port=8080


# ===============================
# DATABASE (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/jobportal
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# (Enable only during development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# JWT CONFIG
# ===============================
jwt.secret=mysupersecurejwtsecretkeymysupersecurejwtsecretkey
jwt.expiration-ms=86400000


# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Custom upload directory (used in service)
file.upload-dir=C:/jobportal/uploads/resumes/
#file.upload-dir=uploads/resumes/


# ===============================
# LOGGING (DEBUG SECURITY)
# ===============================
logging.level.org.springframework.security=DEBUG


# ===============================
# OPTIONAL (for frontend later)
# ===============================
# spring.web.cors.allowed-origins=*